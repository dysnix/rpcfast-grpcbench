name: Release binaries

on:
  push:
    tags:
      - "*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.asset_name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-15
            target: aarch64-apple-darwin
            asset_name: rpcfast-grpcbench-darwin-arm64
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            asset_name: rpcfast-grpcbench-linux-amd64
          - os: ubuntu-22.04-arm
            target: aarch64-unknown-linux-gnu
            asset_name: rpcfast-grpcbench-linux-arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust target
        run: |
          rustup toolchain install stable --profile minimal --target "${{ matrix.target }}"
          rustup default stable

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libssl-dev

      - name: Build release binary
        run: cargo build --release --locked --target "${{ matrix.target }}"

      - name: Prepare asset
        run: |
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/rpcfast-grpcbench" "dist/${{ matrix.asset_name }}"
          chmod +x "dist/${{ matrix.asset_name }}"

      - name: Upload asset
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: dist/${{ matrix.asset_name }}
          if-no-files-found: error

  release:
    name: Create GitHub Release
    runs-on: ubuntu-22.04
    needs: build

    steps:
      - name: Download assets
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" dist/* \
            --repo "${GITHUB_REPOSITORY}" \
            --title "${GITHUB_REF_NAME}" \
            --generate-notes
